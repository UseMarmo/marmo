name: Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches: [main, master]
    paths:
      - 'desktop/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'desktop/**'

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: desktop
      - run: bun run build
        working-directory: desktop

  release:
    name: ${{ matrix.platform }} ${{ matrix.args }}
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-24.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./desktop/src-tauri -> target
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - run: bun install --frozen-lockfile
        working-directory: desktop

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Marmo ${{ github.ref_name }}'
          releaseBody: |
            ### Download

            | Platform | File to download |
            |---|---|
            | **macOS** Apple Silicon | the `.dmg` ending in `_aarch64.dmg` |
            | **macOS** Intel | the `.dmg` ending in `_x64.dmg` |
            | **Windows** | the `-setup.exe` file |
            | **Linux** (all distros) | `Marmo.flatpak` |
            | **Linux** Ubuntu / Debian | the `.deb` file |
            | **Linux** AppImage | the `.AppImage` file |

            After downloading `Marmo.flatpak` run:
            ```
            flatpak install --user Marmo.flatpak
            ```
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: desktop

      - name: Install Flatpak tools
        if: matrix.platform == 'ubuntu-24.04'
        run: sudo apt-get install -y flatpak flatpak-builder

      - name: Prepare Flatpak sources
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          cp desktop/src-tauri/target/release/marmo-desktop packaging/flatpak/marmo-desktop
          cp desktop/src-tauri/icons/128x128.png packaging/flatpak/icon.png

      - name: Build Flatpak bundle
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y flathub org.gnome.Platform/x86_64/48 org.gnome.Sdk/x86_64/48
          flatpak-builder --user --repo=flatpak-repo --force-clean flatpak-build packaging/flatpak/xyz.marmo.Desktop.yml
          flatpak build-bundle flatpak-repo Marmo.flatpak xyz.marmo.Desktop

      - name: Upload Flatpak to release
        if: matrix.platform == 'ubuntu-24.04'
        run: gh release upload ${{ github.ref_name }} Marmo.flatpak --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
