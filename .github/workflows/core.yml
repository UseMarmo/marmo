name: Core

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'db/**'
      - 'Dockerfile'
      - 'package.json'
      - 'bun.lock'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'db/**'
      - 'Dockerfile'
      - 'package.json'
      - 'bun.lock'

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun build src/server.ts --target bun --outfile /tmp/server.build.js

  binary:
    name: Binary
    needs: check
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun build --compile src/server.ts --outfile dist/marmo-core
      - uses: actions/upload-artifact@v4
        with:
          name: marmo-core-linux
          path: dist/marmo-core

  build-push:
    name: Build & Push
    needs: check
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/core:latest
            ghcr.io/${{ steps.owner.outputs.value }}/core:${{ github.sha }}

  deploy:
    name: Deploy
    needs: build-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Trigger Render deploy
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set, skipping deploy"
            exit 0
          fi
          curl -sf "$RENDER_DEPLOY_HOOK_URL" && echo "Deploy triggered" || echo "Deploy hook call failed (non-blocking)"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
